services:
  survey-app-e2e:
    build: .
    command: npm run start:test
    ports:
      - "5001:5000"
    environment:
      MONGODB_URI_TEST: mongodb://user:password@mongo-e2e:27017/survey-app-test?authSource=admin
      SECRET: SECRET
      PORT: 5000
    depends_on:
      mongo-e2e:
        condition: service_healthy
    restart: on-failure
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://localhost:5000').then(r => process.exit(r.ok ? 0 : 1)).catch(() => process.exit(1))"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    networks:
      - e2e-network

  mongo-e2e:
    image: mongo:7.0
    ports:
      - "27018:27017"
    volumes:
      - mongo-e2e-data:/data/db
    environment:
      MONGO_INITDB_ROOT_USERNAME: user
      MONGO_INITDB_ROOT_PASSWORD: password
      MONGO_INITDB_DATABASE: admin
    healthcheck:
      test: ["CMD", "mongosh", "--host", "localhost", "-u", "user", "-p", "password", "--authenticationDatabase", "admin", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    networks:
      - e2e-network

  e2e:
    build: ./e2e-tests
    environment:
      - BASE_URL=http://survey-app-e2e:5000
    volumes:
      - ./e2e-tests/playwright-report:/app/playwright-report
      - ./e2e-tests/test-results:/app/test-results
    depends_on:
      survey-app-e2e:
        condition: service_healthy
    networks:
      - e2e-network

volumes:
  mongo-e2e-data:

networks:
  e2e-network:
    driver: bridge